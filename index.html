<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charity: Water</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Make a difference, one drop at a time</h1>
    <p>Join college students worldwide in helping solve the water crisis.</p>
    <button>Join Us</button>
  </section>

  <!-- STORY SECTION -->
  <section class="story">
    <img src="img/water.jpg" alt="Clean water">
    <div>
      <h2>Why Water?</h2>
      <p>771 million people on earth don’t have access to clean water. Together, we can change that.</p>
    </div>
  </section>

  <!-- CTA SECTION -->
  <section class="cta">
    <h2>Be part of the solution</h2>
    <button>Donate Now</button>
  </section>
</body>
</html>
